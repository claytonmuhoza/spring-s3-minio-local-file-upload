spring:
  application:
    name: fileupload
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:S3}
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 512MB
      file-size-threshold: 2KB
      location: /tmp/urban-uploads-temp

minio:
  url: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minio-user}
  secret-key: ${MINIO_SECRET_KEY:storage-minio}
  bucket-name: ${MINIO_BUCKET_NAME:storagebucket}

storage:
  local:
    dir: ${LOCAL_STORAGE_DIR:uploads-local-dev}