services:
  minio:
    image: docker.io/minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["minio", "server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: curl -fLI http://localhost:9000/minio/health/live
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - 9001:9001
      - 9000:9000
    volumes:
      - minio-data:/data
    networks:
      - file-storage
  
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    entrypoint: [
      "/bin/sh", 
      "-c", 
      "mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; mc mb local/$${MINIO_BUCKET_NAME} --ignore-existing;"
    ]
    networks:
      - file-storage
volumes:
  minio-data:

networks:
  file-storage: